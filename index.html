<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0F0F0D;
            --bg-secondary: #131310;
            --brand-yellow: #F5C842;
            --text-primary: #F2F0EA;
            --text-secondary: rgba(242, 240, 234, 0.6);
            --off-white: #f2f0ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Background Topo Animation --- */
        .topo-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 320 Q100 310 200 315 Q300 320 400 310 M0 240 Q100 230 200 235 Q300 240 400 230 M0 160 Q100 150 200 155 Q300 160 400 150 M0 80 Q100 70 200 75 Q300 80 400 70' stroke='%23F5C842' stroke-width='1' fill='none'/%3E%3C/svg%3E");
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-400px); }
        }

        .container {
            max-width: 1100px;
            width: 100%;
            padding: 80px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
        }

        /* --- Brand Wordmark --- */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: fit-content;
        }

        .wordmark {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(60px, 10vw, 96px);
            color: var(--off-white);
            line-height: 0.8;
            letter-spacing: -2px;
            margin-top: -10px;
        }

        /* --- Exploded Isometric Product Mock --- */
        .product-stage {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .exploded-view {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The Terrain Model (Solid Vector Style) */
        .terrain-layer {
            width: 420px;
            height: 240px;
            position: relative;
            transform: rotateX(45deg) rotateZ(-15deg) translateY(20px);
            z-index: 2;
            filter: drop-shadow(20px 40px 30px rgba(0,0,0,0.7));
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Floating Track Line (Top Layer) */
        .track-layer {
            width: 420px;
            height: 240px;
            position: absolute;
            transform: rotateX(45deg) rotateZ(-15deg) translateY(-80px);
            z-index: 3;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .gps-path {
            fill: none;
            stroke: var(--brand-yellow);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 10px rgba(245, 200, 66, 0.4));
        }

        /* --- Content --- */
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .coming-soon-chip {
            background: rgba(245, 200, 66, 0.1);
            color: var(--brand-yellow);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid rgba(245, 200, 66, 0.2);
        }

        h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(32px, 6vw, 56px);
            text-transform: uppercase;
            letter-spacing: -0.01em;
            line-height: 1;
        }

        .subheadline {
            font-size: clamp(16px, 2vw, 19px);
            color: var(--text-secondary);
            max-width: 520px;
            line-height: 1.5;
        }

        /* Interactive Hover */
        .product-stage:hover .track-layer {
            transform: rotateX(45deg) rotateZ(-15deg) translateY(-110px);
        }
        .product-stage:hover .terrain-layer {
            transform: rotateX(45deg) rotateZ(-15deg) translateY(30px);
        }
    </style>
</head>
<body>

    <div class="topo-bg"></div>

    <div class="container">
        <div class="logo-container">
            <svg width="240" height="60" viewBox="0 0 358 90" fill="none">
                <path d="M0 86 C 60 86, 110 6, 148 6 C 176 6, 210 36, 228 36 C 272 36, 318 4, 355 4" stroke="#F5C842" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
            </svg>
            <div class="wordmark">ASCEND</div>
        </div>

        <div class="product-stage">
            <div class="exploded-view">
                
                <div class="track-layer">
                    <svg viewBox="0 0 200 120" width="100%" height="100%">
                        <path class="gps-path" d="M30 80 Q 50 60, 70 90 T 110 40 T 150 70 T 180 50" />
                        <circle cx="180" cy="50" r="4" fill="var(--brand-yellow)" />
                        <circle cx="180" cy="50" r="10" stroke="var(--brand-yellow)" stroke-width="1" fill="none" opacity="0.3" />
                    </svg>
                </div>

                <div class="terrain-layer">
                    <svg viewBox="0 0 200 120" width="100%" height="100%">
                        <path d="M10 60 L100 10 L190 60 L100 110 Z" fill="#1A1A17" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
                        <path d="M40 50 Q 100 30 160 50" stroke="rgba(255,255,255,0.05)" fill="none" />
                        <path d="M30 70 Q 100 50 170 70" stroke="rgba(255,255,255,0.05)" fill="none" />
                        <path d="M50 85 Q 100 65 150 85" stroke="rgba(255,255,255,0.05)" fill="none" />
                    </svg>
                </div>

            </div>
        </div>

        <div class="hero-content">
            <div class="coming-soon-chip">Coming Soon</div>
            <h2>Your acheivements. In three dimensions.</h2>
            <p class="subheadline">High-fidelity memorabilia for the modern athlete.</p>
        </div>
    </div>

</body>
</html>
